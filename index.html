<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheetboard 💨</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .fart-btn {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 16px;
      padding: 24px 16px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    .fart-btn:hover {
      background: #0f3460;
      border-color: #e94560;
    }

    .fart-btn:active,
    .fart-btn.playing {
      transform: scale(0.95);
      background: #e94560;
      border-color: #e94560;
    }

    .fart-btn .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0f3460;
      transition: border-color 0.2s;
    }

    .fart-btn:hover .avatar {
      border-color: #e94560;
    }

    .fart-btn.playing .avatar {
      border-color: #fff;
    }

    .fart-btn .name {
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      color: #fff;
    }

    .fart-btn .date {
      font-size: 0.8rem;
      color: #aaa;
    }

    .fart-btn.playing .date {
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>💨 Scheetboard</h1>
  <p class="subtitle">Klik op een knop om de klassieke te horen</p>

  <div class="grid" id="board"></div>



  <script>
    /*
     * =============================================
     * VOEG HIER JOUW SCHEETEN TOE / BEWERK ZE HIER
     * =============================================
     *
     * Elk object heeft:
     *   name  — naam van de persoon
     *   date  — datum van de historische gebeurtenis
     *   file  — audiobestand in de map /audio/
     *   image — foto in de map /images/
     */
    const sounds = [
      { name: "Timmie",   date: "2 juli 2023", file: "Timmie 02-07-2023.mp3",   emoji: "💨" },
      { name: "DD",    date: "5 januari 2026",  file: "DD 05-01.mp3", image: "DD.png" },
      { name: "Jan", date: "8 januari 2026", file: "Jan 08-01.mp3", emoji: "💨" },
      { name: "DD", date: "8 februari 2026", file: "DD 08-02.mp3", image: "DD.png" },
      { name: "Eelke", date: "21 januari 2026", file: "Eelke 21-01.mp3", emoji: "💨" },
      // Voeg hier meer toe ↓
      // { name: "Naam", date: "dag maand jaar", file: "naam.mp3", image: "naam.jpg" },
    ];

    /*
     * =============================================
     * HIERONDER HOEF JE NIETS TE VERANDEREN
     * =============================================
     */
    const board = document.getElementById('board');
    let currentAudio = null;

    sounds.forEach(sound => {
      const btn = document.createElement('button');
      btn.className = 'fart-btn';
      btn.innerHTML = `
        <img class="avatar" src="images/${sound.image}" alt="${sound.name}" />
        <span class="name">${sound.name}</span>
        <span class="date">${sound.date}</span>
      `;

      btn.addEventListener('click', () => {
        // Stop huidig geluid als er al iets speelt
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          document.querySelectorAll('.fart-btn').forEach(b => b.classList.remove('playing'));
        }

        const audio = new Audio(`audio/${sound.file}`);
        currentAudio = audio;
        btn.classList.add('playing');

        audio.play().catch(() => {
          alert(`Bestand niet gevonden: audio/${sound.file}`);
          btn.classList.remove('playing');
        });

        audio.addEventListener('ended', () => {
          btn.classList.remove('playing');
          currentAudio = null;
        });
      });

      board.appendChild(btn);
    });
  </script>
</body>
</html>
