<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheetboard 💨</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2.8rem; margin-bottom: 8px; letter-spacing: 2px; }

    .subtitle { color: #aaa; margin-bottom: 40px; font-size: 1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    /* ── Sound buttons ── */
    .fart-btn {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 16px;
      padding: 24px 16px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    .fart-btn:hover { background: #0f3460; border-color: #e94560; }

    .fart-btn:active,
    .fart-btn.playing {
      transform: scale(0.95);
      background: #e94560;
      border-color: #e94560;
    }

    .fart-btn .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0f3460;
      transition: border-color 0.2s;
    }

    .fart-btn:hover .avatar { border-color: #e94560; }
    .fart-btn.playing .avatar { border-color: #fff; }

    .fart-btn .avatar-placeholder {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #0f3460;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      transition: border-color 0.2s;
    }

    .fart-btn:hover .avatar-placeholder { border-color: #e94560; }
    .fart-btn.playing .avatar-placeholder { border-color: #fff; }

    .fart-btn .name { font-size: 1.1rem; font-weight: bold; text-align: center; color: #fff; }
    .fart-btn .date { font-size: 0.8rem; color: #aaa; }
    .fart-btn.playing .date { color: #fff; }

    /* ── Add card ── */
    .add-card {
      background: #16213e;
      border: 2px dashed #0f3460;
      border-radius: 16px;
      padding: 24px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #555;
      transition: border-color 0.2s, color 0.2s;
      min-height: 195px;
    }

    .add-card:hover { border-color: #e94560; color: #e94560; }
    .add-card .plus { font-size: 2.8rem; line-height: 1; }
    .add-card .add-label { font-size: 0.85rem; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      max-height: 92vh;
      overflow-y: auto;
      margin: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 { font-size: 1.4rem; }

    .modal-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    .modal-close:hover { color: #fff; }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input[type="text"],
    .form-group input[type="password"] {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .form-group input[type="text"]:focus,
    .form-group input[type="password"]:focus {
      outline: none;
      border-color: #e94560;
    }

    .form-group input[type="file"] {
      width: 100%;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .form-group .hint {
      font-size: 0.75rem;
      color: #555;
      margin-top: 6px;
      line-height: 1.4;
    }

    .form-group .hint a { color: #e94560; }

    .token-saved-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 0.85rem;
    }

    .token-saved-bar .ok { color: #4caf50; }

    .token-saved-bar button {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
    }

    .submit-btn {
      width: 100%;
      background: #e94560;
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg  { color: #e94560; font-size: 0.85rem; margin-top: 12px; text-align: center; }
    .success-msg { color: #4caf50; font-size: 0.9rem; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>

  <h1>💨 Scheetboard</h1>
  <p class="subtitle">Klik op een knop om de klassieke te horen</p>

  <div class="grid" id="board"></div>

  <!-- Upload modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Scheet toevoegen 💨</h2>
        <button class="modal-close" id="modalClose" aria-label="Sluiten">×</button>
      </div>

      <!-- GitHub token (eenmalig) -->
      <div id="tokenSection" class="form-group">
        <label>GitHub Token</label>
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
        <p class="hint">
          Eenmalig nodig om bestanden naar GitHub te sturen. Word opgeslagen in je browser.<br>
          <a href="https://github.com/settings/tokens/new?scopes=repo&description=Scheetboard" target="_blank">
            Token aanmaken
          </a>
          &nbsp;— vink <strong>repo</strong> aan.
        </p>
      </div>
      <div id="tokenSavedBar" class="token-saved-bar" style="display:none">
        <span class="ok">Token opgeslagen ✓</span>
        <button id="changeTokenBtn">Wijzigen</button>
      </div>

      <!-- Upload velden -->
      <div class="form-group">
        <label>Naam van de scheetmaker</label>
        <input type="text" id="nameInput" placeholder="bijv. Joost" />
      </div>
      <div class="form-group">
        <label>Datum van de scheet</label>
        <input type="text" id="dateInput" placeholder="bijv. 22 feb 2026" />
      </div>
      <div class="form-group">
        <label>Geluidsbestand (mp3, wav, ...)</label>
        <input type="file" id="audioInput" accept="audio/*" />
      </div>
      <div class="form-group">
        <label>Foto (optioneel)</label>
        <input type="file" id="imageInput" accept="image/*" />
      </div>

      <button class="submit-btn" id="submitBtn">💨 Uploaden</button>
      <p class="error-msg"  id="errorMsg"></p>
      <p class="success-msg" id="successMsg"></p>
    </div>
  </div>

  <script>
    // ── Repo config ──────────────────────────────────────────────────────────
    const REPO_OWNER = 'ChefJoost';
    const REPO_NAME  = 'Soundboard';
    const BRANCH     = 'main';

    // ── GitHub API helpers ───────────────────────────────────────────────────
    async function ghGet(token, path) {
      const res = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`,
        { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
      );
      return res.ok ? res.json() : null;
    }

    async function ghPut(token, path, base64, message, sha) {
      const body = { message, content: base64, branch: BRANCH };
      if (sha) body.sha = sha;
      const res = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
        {
          method: 'PUT',
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        }
      );
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'GitHub API fout');
      }
      return res.json();
    }

    async function fileToBase64(file) {
      const buf   = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let binary  = '';
      for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    function textToBase64(str) {
      const bytes = new TextEncoder().encode(str);
      let binary  = '';
      for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    // ── Render board ─────────────────────────────────────────────────────────
    const board = document.getElementById('board');
    let currentAudio = null;

    function renderSound(sound) {
      const btn = document.createElement('button');
      btn.className = 'fart-btn';
      const avatar = sound.image
        ? `<img class="avatar" src="images/${sound.image}" alt="${sound.name}" />`
        : `<span class="avatar-placeholder">💨</span>`;
      btn.innerHTML = `
        ${avatar}
        <span class="name">${sound.name}</span>
        <span class="date">${sound.date}</span>
      `;
      btn.addEventListener('click', () => {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          document.querySelectorAll('.fart-btn').forEach(b => b.classList.remove('playing'));
        }
        const audio = new Audio(`audio/${sound.file}`);
        currentAudio = audio;
        btn.classList.add('playing');
        audio.play().catch(() => btn.classList.remove('playing'));
        audio.addEventListener('ended', () => {
          btn.classList.remove('playing');
          currentAudio = null;
        });
      });
      board.appendChild(btn);
    }

    function renderAddCard() {
      const card = document.createElement('button');
      card.className = 'add-card';
      card.innerHTML = `<span class="plus">+</span><span class="add-label">Scheet toevoegen</span>`;
      card.addEventListener('click', openModal);
      board.appendChild(card);
    }

    async function init() {
      let sounds = [];
      try {
        const res = await fetch(`sounds.json?t=${Date.now()}`);
        if (res.ok) sounds = await res.json();
      } catch (e) {}
      sounds.forEach(renderSound);
      renderAddCard();
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    const overlay        = document.getElementById('modalOverlay');
    const tokenSection   = document.getElementById('tokenSection');
    const tokenSavedBar  = document.getElementById('tokenSavedBar');
    const tokenInput     = document.getElementById('tokenInput');
    const changeTokenBtn = document.getElementById('changeTokenBtn');
    const nameInput      = document.getElementById('nameInput');
    const dateInput      = document.getElementById('dateInput');
    const audioInput     = document.getElementById('audioInput');
    const imageInput     = document.getElementById('imageInput');
    const submitBtn      = document.getElementById('submitBtn');
    const errorMsg       = document.getElementById('errorMsg');
    const successMsg     = document.getElementById('successMsg');

    function openModal() {
      const saved = localStorage.getItem('gh_token');
      tokenSection.style.display  = saved ? 'none'  : 'block';
      tokenSavedBar.style.display = saved ? 'flex'  : 'none';

      // Vandaag als standaarddatum
      const d = new Date();
      const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
      dateInput.value = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

      errorMsg.textContent   = '';
      successMsg.textContent = '';
      submitBtn.disabled     = false;
      submitBtn.textContent  = '💨 Uploaden';
      overlay.classList.add('open');
    }

    document.getElementById('modalClose').addEventListener('click', () => {
      overlay.classList.remove('open');
    });

    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });

    changeTokenBtn.addEventListener('click', () => {
      localStorage.removeItem('gh_token');
      tokenInput.value            = '';
      tokenSection.style.display  = 'block';
      tokenSavedBar.style.display = 'none';
    });

    submitBtn.addEventListener('click', async () => {
      errorMsg.textContent   = '';
      successMsg.textContent = '';

      const token = localStorage.getItem('gh_token') || tokenInput.value.trim();
      const name  = nameInput.value.trim();
      const date  = dateInput.value.trim();
      const audio = audioInput.files[0];
      const image = imageInput.files[0];

      if (!token) return (errorMsg.textContent = 'Voer een GitHub token in.');
      if (!name)  return (errorMsg.textContent = 'Voer een naam in.');
      if (!date)  return (errorMsg.textContent = 'Voer een datum in.');
      if (!audio) return (errorMsg.textContent = 'Kies een geluidsbestand.');

      localStorage.setItem('gh_token', token);
      tokenSection.style.display  = 'none';
      tokenSavedBar.style.display = 'flex';

      submitBtn.disabled = true;

      try {
        const slug      = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        const ts        = Date.now();
        const audioExt  = audio.name.split('.').pop();
        const audioFile = `${slug}-${ts}.${audioExt}`;

        // 1. Upload audio
        submitBtn.textContent = 'Audio uploaden...';
        const existingAudio = await ghGet(token, `audio/${audioFile}`);
        await ghPut(token, `audio/${audioFile}`, await fileToBase64(audio),
          `Voeg audio toe: ${name}`, existingAudio?.sha);

        // 2. Upload foto (optioneel)
        let imageFile = null;
        if (image) {
          submitBtn.textContent = 'Foto uploaden...';
          const imageExt = image.name.split('.').pop();
          imageFile = `${slug}-${ts}.${imageExt}`;
          const existingImage = await ghGet(token, `images/${imageFile}`);
          await ghPut(token, `images/${imageFile}`, await fileToBase64(image),
            `Voeg foto toe: ${name}`, existingImage?.sha);
        }

        // 3. Update sounds.json
        submitBtn.textContent = 'Lijst bijwerken...';
        const existingSoundsFile = await ghGet(token, 'sounds.json');
        let soundsList = [];
        if (existingSoundsFile) {
          soundsList = JSON.parse(atob(existingSoundsFile.content.replace(/\n/g, '')));
        }
        soundsList.push({ name, date, file: audioFile, image: imageFile });
        await ghPut(
          token, 'sounds.json',
          textToBase64(JSON.stringify(soundsList, null, 2)),
          `Voeg scheet toe: ${name} (${date})`,
          existingSoundsFile?.sha
        );

        successMsg.textContent = '✓ Geüpload! Pagina herlaadt over 3 seconden...';
        setTimeout(() => location.reload(), 3000);

      } catch (err) {
        errorMsg.textContent  = err.message || 'Er ging iets mis.';
        submitBtn.disabled    = false;
        submitBtn.textContent = '💨 Uploaden';
      }
    });

    // ── Start ─────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
